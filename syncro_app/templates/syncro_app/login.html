{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Syncro</title>
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --spotify-black: #121212;
            --spotify-bg: #000000;
            --spotify-card: #181818;
            --spotify-card-hover: #282828;
            --spotify-green: #1DB954;
            --spotify-green-hover: #1ed760;
            --spotify-white: #FFFFFF;
            --spotify-muted: #B3B3B3;
            --spotify-border: #282828;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--spotify-bg);
            color: var(--spotify-white);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #1f1f1f 0%, #000000 100%);
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 40px;
            background-color: var(--spotify-black);
            border-radius: 12px;
            border: 1px solid var(--spotify-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        .brand-logo img {
            height: 48px;
            width: auto;
            margin-bottom: 16px;
            object-fit: contain;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
        }

        /* Form styling */
        .form-label-spotify {
            display: block;
            text-align: left;
            color: var(--spotify-white);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-control-spotify {
            background-color: var(--spotify-card);
            border: 1px solid var(--spotify-muted);
            color: var(--spotify-white);
            border-radius: 6px;
            padding: 12px 16px;
            transition: all 0.2s ease;
            font-weight: 500;
            width: 100%;
        }

        .form-control-spotify:focus {
            background-color: var(--spotify-card-hover);
            border-color: var(--spotify-green);
            box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.25);
            color: var(--spotify-white);
            outline: none;
        }

        .btn-spotify {
            background-color: var(--spotify-green);
            color: var(--spotify-bg);
            font-weight: 700;
            border-radius: 30px;
            padding: 12px 24px;
            border: none;
            width: 100%;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease, background-color 0.2s ease;
            margin-top: 16px;
        }

        .btn-spotify:hover {
            background-color: var(--spotify-green-hover);
            transform: scale(1.02);
            color: var(--spotify-bg);
        }

        /* Helper box for grading credentials */
        .credential-box {
            background-color: rgba(29, 185, 84, 0.05);
            border: 1px dashed var(--spotify-green);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
            font-size: 13px;
            color: var(--spotify-muted);
        }

        .credential-box strong {
            color: var(--spotify-white);
        }

        /* Toast alerts */
        .alert-container {
            margin-bottom: 24px;
        }

        .alert-spotify-danger {
            background-color: rgba(242, 60, 60, 0.1) !important;
            border: 1px solid #f23c3c !important;
            color: #ff6b6b !important;
            border-radius: 8px;
            text-align: left;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Logo -->
        <div class="brand-logo">
            <img src="{% static 'syncro_app/img/logo.png' %}" alt="Syncro Logo">
        </div>
        
        <h2 class="login-title">Iniciar sesión en Syncro</h2>

        <!-- Alert messages -->
        {% if messages %}
        <div class="alert-container">
            {% for message in messages %}
            <div class="alert alert-spotify-danger alert-dismissible fade show" role="alert">
                <div class="d-flex align-items-center">
                    <i class="bi bi-exclamation-triangle-fill me-2 fs-6"></i>
                    <div>{{ message }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Credentials Helper -->
        <div class="credential-box">
            <div class="d-flex align-items-center mb-2">
                <i class="bi bi-info-circle-fill text-success fs-5 me-2"></i>
                <span class="text-success" style="font-weight: 700;">Credenciales de Calificación</span>
            </div>
            <p class="m-0 mb-1">Usa estas credenciales para acceder al proyecto:</p>
            <div class="ps-2">
                • Correo: <strong>admin@syncro.com</strong><br>
                • Clave: <strong>admin123</strong>
            </div>
        </div>

        <form method="POST" action="">
            {% csrf_token %}
            
            <!-- Email -->
            <div class="mb-3 text-start">
                <label for="email" class="form-label-spotify">Correo Electrónico</label>
                <input type="email" class="form-control-spotify" id="email" name="email" 
                       placeholder="nombre@correo.com" required autocomplete="off">
            </div>

            <!-- Password -->
            <div class="mb-4 text-start">
                <label for="password" class="form-label-spotify">Contraseña</label>
                <input type="password" class="form-control-spotify" id="password" name="password" 
                       placeholder="Ingresa tu contraseña" required autocomplete="off">
            </div>

            <button type="submit" class="btn btn-spotify">Iniciar Sesión</button>
        </form>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
